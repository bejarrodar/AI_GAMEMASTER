name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,ui]
          python -m pip check

      - name: Lint
        run: ruff check .

      - name: Dependency vulnerability audit
        run: |
          python -m pip install --upgrade pip-audit
          python -m pip_audit

      - name: Run health endpoint tests
        run: pytest -q tests/test_health_endpoint.py

      - name: Run model eval regression harness
        run: python scripts/model_eval_regression.py --fail-on 1

      - name: Run full test suite
        run: pytest -q
